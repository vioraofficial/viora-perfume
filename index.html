<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>VIORA | Ultra Luxury Perfumes</title>

<link href="https://fonts.googleapis.com/css2?family=Playfair+Display:wght@500;700&display=swap" rel="stylesheet">

<style>
body {
    margin: 0;
    font-family: 'Playfair Display', serif;
    background: radial-gradient(circle at top, #111, #000);
    color: white;
}

/* TOP BAR */
header {
    text-align: center;
    padding: 25px;
    border-bottom: 1px solid rgba(255,215,0,0.3);
}
header h1 {
    color: gold;
    letter-spacing: 12px;
    font-size: 40px;
}

/* HERO */
.hero {
    text-align: center;
    padding: 80px 20px;
}
.hero h2 {
    font-size: 50px;
    color: gold;
}
.hero p {
    color: #bbb;
    font-size: 18px;
}

/* GRID */
.products {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 25px;
    padding: 40px;
}

/* CARD */
.card {
    background: rgba(255,255,255,0.05);
    border: 1px solid rgba(255,215,0,0.2);
    border-radius: 18px;
    overflow: hidden;
    transition: 0.4s;
    backdrop-filter: blur(10px);
}
.card:hover {
    transform: translateY(-10px);
    border-color: gold;
}

.card img {
    width: 100%;
    height: 260px;
    object-fit: cover;
}

.card h3 {
    color: gold;
    margin: 10px 0;
}

.price {
    color: #ccc;
}

/* BUTTON */
button {
    background: gold;
    border: none;
    padding: 12px;
    width: 100%;
    cursor: pointer;
    font-weight: bold;
    transition: 0.3s;
}
button:hover {
    background: #d4af37;
}

/* CART */
.cart {
    position: fixed;
    right: 20px;
    top: 20px;
    background: rgba(0,0,0,0.8);
    border: 1px solid gold;
    padding: 15px;
    width: 220px;
    backdrop-filter: blur(10px);
}

.cart a {
    display: block;
    margin-top: 10px;
    padding: 10px;
    background: #25D366;
    color: white;
    text-align: center;
    text-decoration: none;
    font-weight: bold;
}
</style>
</head>

<body>

<header>
    <h1>VIORA</h1>
</header>

<div class="hero">
    <h2>Ultra Luxury Fragrance House</h2>
    <p>Crafted for elegance. Designed for presence.</p>
</div>

<div class="cart">
    <h3>Cart</h3>
    <p id="count">Items: 0</p>
    <a id="order" href="#">Order on WhatsApp</a>
</div>

<div class="products">

    <div class="card">
        <img src="noir.jpg">
        <h3>VIORA Noir</h3>
        <p class="price">Rs 499</p>
        <button onclick="add('VIORA Noir')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="bloom.jpg">
        <h3>VIORA Bloom</h3>
        <p class="price">Rs 599</p>
        <button onclick="add('VIORA Bloom')">Add to Cart</button>
    </div>

    <div class="card">
        <img src="gold.jpg">
        <h3>VIORA Gold</h3>
        <p class="price">Rs 699</p>
        <button onclick="add('VIORA Gold')">Add to Cart</button>
    </div>

</div>

<script>
let cart = [];

function add(item) {
    cart.push(item);
    document.getElementById("count").innerText = "Items: " + cart.length;

    let msg = "Hello, I want to order:%0A" + cart.join("%0A");

    document.getElementById("order").href =
        "https://wa.me/92XXXXXXXXXX?text=" + msg;
}
</script>

</body>
</html>
